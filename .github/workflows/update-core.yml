name: Update conference paper lists

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone Paper Copilot baseline
        run: git clone --depth 1 https://github.com/papercopilot/paperlists.git ../paperlists

      - name: Refresh conference index
        run: >
          python scripts/build_conference_index.py
          --paperlists ../paperlists
          --output config/conferences.json
          --merge-existing-targets

      - name: Harvest official sources
        run: python scripts/harvest_matrix.py --validate --paperlists ../paperlists

      - name: Rebuild full coverage report
        run: python scripts/rebuild_coverage.py

      - name: Audit normalized data quality
        run: python scripts/audit_normalized.py

      - name: Validate Python sources
        run: python -m compileall -q src scripts

      - name: Create update pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data: refresh conference paper lists"
          title: "data: refresh conference paper lists"
          body: |
            Automated refresh of official-source harvests, Paper Copilot validation reports, and full coverage metadata.
          branch: automation/update-paper-lists
          delete-branch: true
